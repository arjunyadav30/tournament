<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Profile | NPL</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* 🔥 GLOBAL STYLES */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 🔥 NAVBAR */
        .navbar {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(45deg, #00ffcc, #00c3ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 20px;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: 0.3s;
        }

        .nav-links a:hover { color: #00ffcc; }

        .logout { color: #ff6b6b !important; }

        /* 🔥 PROFILE CARD */
        .container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .profile-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            padding: 50px 40px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        .avatar {
            width: 100px;
            height: 100px;
            background: linear-gradient(45deg, #00ffcc, #00c3ff);
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            color: #000;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.4);
        }

        .profile-card h2 {
            font-size: 28px;
            margin-bottom: 10px;
            color: #fff;
        }

        .role-tag {
            background: rgba(0, 255, 204, 0.1);
            color: #00ffcc;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: inline-block;
            margin-bottom: 30px;
        }

        .info-box {
            text-align: left;
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
        }

        .info-box p {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 10px;
        }

        .info-box p strong {
            color: #fff;
            display: block;
            font-size: 16px;
            margin-top: 2px;
        }

        .logout-btn {
            display: block;
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
            color: white;
            text-decoration: none;
            padding: 15px;
            border-radius: 12px;
            font-weight: 700;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(255, 65, 108, 0.3);
        }

        .logout-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(255, 65, 108, 0.5);
        }

        /* MOBILE RESPONSIVE */
        .menu-toggle { display: none; cursor: pointer; font-size: 24px; }

        @media (max-width: 600px) {
            .menu-toggle { display: block; }
            .nav-links { display: none; }
            .profile-card { padding: 40px 25px; }
        }
    </style>
</head>
<body>

<nav class="navbar">
    <h2 class="logo">🏏 NPL ADMIN</h2>

    <div class="menu-toggle" onclick="toggleMenu()">☰</div>

    <ul class="nav-links" id="navLinks">
        <li><a href="/admin/dashboard">Dashboard</a></li>
        <li><a href="/admin/profile">Profile</a></li>
        <li><a href="/logout" class="logout">Logout</a></li>
    </ul>
</nav>

<div class="container">

    <div class="profile-card">
        <div class="avatar">👤</div>
        <h2>Arjun Yadav</h2>
        <span class="role-tag">Super Admin</span>

        <div class="info-box">
            <p>Email Address <strong>admin@gmail.com</strong></p>
            <p>Tournament <strong>Netyakhedi Premier League</strong></p>
            <p>Account Status <strong style="color: #00ffcc;">Verified ✓</strong></p>
        </div>

        <a href="/logout" class="logout-btn">Log Out Account</a>
    </div>

</div>

<script>
function toggleMenu() {
    // Menu toggle logic if needed for mobile
    const links = document.getElementById("navLinks");
    links.style.display = links.style.display === "flex" ? "none" : "flex";
}
</script>

</body>
</html>
