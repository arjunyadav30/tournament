<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teams | Admin</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
min-height:100vh;
}

/* 🔥 NAVBAR */
.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 20px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
border-bottom:1px solid rgba(255,255,255,0.1);
}

.navbar h2{
font-size:20px;
color:#00ffcc;
}

.nav-links{
display:flex;
gap:20px;
list-style:none;
}

.nav-links a{
text-decoration:none;
color:white;
font-size:14px;
transition:0.3s;
}

.nav-links a:hover{
color:#00ffcc;
}

/* MOBILE MENU */
.menu-toggle{
display:none;
font-size:22px;
cursor:pointer;
}

@media(max-width:700px){
.nav-links{
display:none;
flex-direction:column;
position:absolute;
top:60px;
right:10px;
background:#203a43;
padding:15px;
border-radius:10px;
}

.nav-links.active{
display:flex;
}

.menu-toggle{
display:block;
}
}

/* CONTAINER */
.container{
padding:20px;
max-width:1000px;
margin:auto;
}

/* BUTTONS */
.top-actions{
display:flex;
gap:10px;
margin-bottom:20px;
flex-wrap:wrap;
}

.btn{
background:linear-gradient(45deg,#00ffcc,#00c3ff);
padding:10px 16px;
border-radius:10px;
text-decoration:none;
color:#000;
font-weight:600;
font-size:14px;
transition:0.3s;
}

.btn:hover{
transform:translateY(-2px);
box-shadow:0 5px 15px rgba(0,255,204,0.4);
}

/* POPUP */
.popup{
background:rgba(0,255,204,0.2);
border:1px solid #00ffcc;
padding:10px;
border-radius:10px;
margin-bottom:15px;
text-align:center;
}

/* CARDS GRID */
.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
}

/* CARD */
.card{
background:rgba(255,255,255,0.06);
border:1px solid rgba(255,255,255,0.1);
border-radius:16px;
padding:15px;
transition:0.3s;
}

.card:hover{
transform:translateY(-3px);
background:rgba(255,255,255,0.1);
}

.card h3{
margin-bottom:8px;
color:#00ffcc;
}

.card p{
font-size:13px;
margin:3px 0;
opacity:0.85;
}

/* DELETE BUTTON */
.delete-btn{
background:rgba(255,60,60,0.2);
color:#ff6b6b;
border:1px solid rgba(255,60,60,0.5);
padding:8px;
border-radius:8px;
cursor:pointer;
font-size:13px;
font-weight:600;
width:100%;
margin-top:10px;
transition:0.3s;
}

.delete-btn:hover{
background:rgba(255,60,60,0.4);
}

/* MOBILE */
@media(max-width:500px){
.btn{
flex:1;
text-align:center;
}
}
</style>
</head>

<body>

<nav class="navbar">
    <h2>🏏 Admin</h2>

    <div class="menu-toggle" onclick="toggleMenu()">☰</div>

    <ul class="nav-links" id="navLinks">
        <li><a href="/admin/dashboard">Dashboard</a></li>
        <li><a href="/admin/teams">Teams</a></li>
        <li><a href="/admin/profile">Profile</a></li>
        <li><a href="/logout">Logout</a></li>
    </ul>
</nav>

<div class="container">

    <!-- SUCCESS -->
    <div th:if="${success}" class="popup" id="popup">
        <p th:text="${success}"></p>
    </div>

    <!-- BUTTONS -->
    <div class="top-actions">
        <a href="/admin/teams/add" class="btn">➕ Add Team</a>
        <a href="/admin/teams/list" class="btn">📋 See All Teams</a>
    </div>

    <!-- TEAM CARDS -->
    <div class="cards">
        <div class="card" th:each="team : ${teams}">
            <h3 th:text="${team.teamName}"></h3>
            <p><b>Captain:</b> <span th:text="${team.captainName}"></span></p>
            <p><b>Village:</b> <span th:text="${team.village}"></span></p>
            <p><b>Status:</b> <span th:text="${team.status}"></span></p>

            <form th:action="@{'/admin/teams/delete/' + ${team.teamId}}" method="post"
                  onsubmit="return confirm('⚠️ Team aur uske saare matches delete ho jayenge. Confirm?');">

                <button type="submit" class="delete-btn">🗑 Delete Team</button>
            </form>
        </div>
    </div>

</div>

<script>
function toggleMenu(){
    document.getElementById("navLinks").classList.toggle("active");
}

// AUTO HIDE POPUP
setTimeout(()=>{
let popup=document.getElementById("popup");
if(popup) popup.style.display="none";
},3000);
</script>

</body>
</html>
