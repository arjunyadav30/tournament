<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toss</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* 🔥 GLOBAL STYLES */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 🔥 NAVBAR */
        .navbar {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px 40px;
        }

        .navbar h2 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(45deg, #00ffcc, #00c3ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 1px;
        }

        /* 🔥 CONTAINER */
        .container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        /* 🔥 FORM CARD */
        .form-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 50px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 500px;
            animation: slideUp 0.6s ease-out;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }

        .form-card:hover {
            border-color: rgba(0, 255, 204, 0.2);
            box-shadow: 0 20px 50px rgba(0, 255, 204, 0.1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-card h2 {
            color: white;
            font-size: 26px;
            margin-bottom: 30px;
            text-align: center;
            font-weight: 600;
        }

        .form-card h2 span {
            background: linear-gradient(45deg, #00ffcc, #00c3ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 700;
        }

        /* 🔥 FORM ELEMENTS */
        form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 8px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        input[type="hidden"] {
            display: none;
        }

        select {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            font-size: 15px;
            color: white;
            background: rgba(255, 255, 255, 0.05);
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
            font-weight: 500;
        }

        select:hover {
            border-color: rgba(0, 255, 204, 0.3);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.1);
        }

        select:focus {
            outline: none;
            border-color: rgba(0, 255, 204, 0.5);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 3px rgba(0, 255, 204, 0.15);
        }

        select option {
            padding: 10px;
            color: white;
            background: #203a43;
        }

        /* 🔥 BUTTON */
        button {
            padding: 14px 20px;
            background: linear-gradient(45deg, #00ffcc, #00c3ff);
            color: black;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 10px 30px rgba(0, 255, 204, 0.4);
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(0, 255, 204, 0.5);
        }

        button:active {
            transform: translateY(0);
            box-shadow: 0 5px 20px rgba(0, 255, 204, 0.3);
        }

        /* 🔥 RESPONSIVE */
        @media (max-width: 768px) {
            .form-card {
                padding: 30px 20px;
            }

            .navbar {
                padding: 15px 20px;
            }

            .navbar h2 {
                font-size: 22px;
            }

            .form-card h2 {
                font-size: 20px;
            }

            button {
                padding: 12px 16px;
                font-size: 14px;
            }
        }

        @media (max-width: 480px) {
            .form-card {
                padding: 20px 15px;
                border-radius: 15px;
            }

            .form-card h2 {
                font-size: 18px;
                margin-bottom: 20px;
            }

            label {
                font-size: 12px;
            }

            select {
                padding: 12px 14px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

<nav class="navbar">
    <h2>🏏 Toss</h2>
</nav>

<div class="container">

    <div class="form-card">

        <h2>
            <span th:text="${match.team1.teamName}"></span> 
            VS 
            <span th:text="${match.team2.teamName}"></span>
        </h2>

        <form action="/admin/matches/toss" method="post">

            <input type="hidden" name="matchId" th:value="${match.matchId}">

            <!-- 🔥 Toss Winner -->
            <label>Toss Winner</label>
            <select name="tossWinner" required>
                <option value="">Select</option>
                <option value="team1" th:text="${match.team1.teamName}"></option>
                <option value="team2" th:text="${match.team2.teamName}"></option>
            </select>

            <!-- 🔥 Decision -->
            <label>Decision</label>
            <select name="decision" required>
                <option value="">Select</option>
                <option value="Bat">Bat</option>
                <option value="Bowl">Bowl</option>
            </select>

            <button type="submit">Start Match</button>

        </form>

    </div>

</div>

</body>
</html>
